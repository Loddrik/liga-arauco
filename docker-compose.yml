services:
  postgres:
    image: postgres:16-alpine
    container_name: liga-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: liga
      POSTGRES_PASSWORD: liga_dev
      POSTGRES_DB: liga_arauco
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U liga -d liga_arauco']
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: liga-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '8080:8080'
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  postgres_data:
