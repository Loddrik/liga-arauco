server {
  # Railway inyecta PORT como env var; sino default a 80.
  listen ${PORT};
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: cualquier ruta no encontrada cae al index.html (client-side routing)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Caché agresivo para assets con hash (Vite los emite con hash en el nombre)
  location ~* \.(js|css|woff2?|png|jpg|jpeg|svg|webp|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # No cachear el index.html (cambia con cada deploy)
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }
}
